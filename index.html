<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Social Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background: linear-gradient(135deg,#020024,#090979,#00d4ff);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* Card */

.card{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(15px);
padding:30px;
border-radius:25px;
width:420px;
text-align:center;
animation: fadeIn 0.6s;
}

/* Icons Grid */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:25px;
}

.iconBox{
background:rgba(0,0,0,0.3);
padding:15px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.iconBox:hover{
transform:scale(1.1);
}

/* Inputs */

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00e5ff;
font-weight:bold;
cursor:pointer;
}

/* Modal */

.modal{
display:none;
position:fixed;
top:0;
left:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
animation: fadeIn 0.4s;
}

.modalContent{
background:#111;
padding:25px;
border-radius:20px;
width:350px;
max-height:80vh;
overflow:auto;
}

.hidden{display:none}

/* Animation */

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<!-- LOGIN BOX -->
<div class="card" id="loginBox">

<h2>🔐 Social Vault</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">
<input id="pin" placeholder="Master PIN">

<button onclick="signup()">Create Account</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<!-- DASHBOARD -->
<div class="card hidden" id="dashboard">

<h2>🌐 Social Accounts</h2>

<div class="grid">

<div class="iconBox" onclick="openApp('Facebook')">📘<br>Facebook</div>
<div class="iconBox" onclick="openApp('Instagram')">📸<br>Instagram</div>
<div class="iconBox" onclick="openApp('Google')">🔍<br>Google</div>
<div class="iconBox" onclick="openApp('TikTok')">🎵<br>TikTok</div>
<div class="iconBox" onclick="openApp('Twitter')">🐦<br>Twitter</div>
<div class="iconBox" onclick="openApp('Other')">➕<br>Add More</div>

</div>

<button onclick="logout()">Logout</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modalContent">

<h3 id="appTitle"></h3>

<input id="accEmail" placeholder="Email / Username">
<input id="accPass" placeholder="Password">

<button onclick="saveAccount()">Add Account</button>

<div id="accountList"></div>

<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

/* STORAGE */

let currentApp="";

/* Signup */

function signup(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
let pin=document.getElementById("pin").value;

let users=JSON.parse(localStorage.getItem("users")||"{}");

if(users[email]){
alert("User Exists");
return;
}

users[email]={
password:CryptoJS.AES.encrypt(password,pin).toString(),
pin:pin,
vault:{}
};

localStorage.setItem("users",JSON.stringify(users));

alert("Account Created ✅");
}

/* Login */

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
let pin=document.getElementById("pin").value;

let users=JSON.parse(localStorage.getItem("users")||"{}");

if(!users[email]) return alert("User Not Found");

let decrypt=CryptoJS.AES.decrypt(
users[email].password,
pin
).toString(CryptoJS.enc.Utf8);

if(decrypt===password){

localStorage.setItem("active_user",email);
localStorage.setItem("vault_pin",pin);

document.getElementById("loginBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

}else alert("Wrong Credentials");

}

/* Dashboard */

function openApp(app){

currentApp=app;

document.getElementById("appTitle").innerText=app+" Vault";

document.getElementById("modal").style.display="flex";

loadAccounts();

}

/* Save Account */

function saveAccount(){

let email=document.getElementById("accEmail").value;
let pass=document.getElementById("accPass").value;

let users=JSON.parse(localStorage.getItem("users")||"{}");

let user=localStorage.getItem("active_user");
let pin=localStorage.getItem("vault_pin");

let encPass=CryptoJS.AES.encrypt(pass,pin).toString();

if(!users[user].vault[currentApp]){
users[user].vault[currentApp]=[];
}

users[user].vault[currentApp].push({
email:email,
password:encPass
});

localStorage.setItem("users",JSON.stringify(users));

alert("Saved ✅");

loadAccounts();
}

/* Load Accounts */

function loadAccounts(){

let list=document.getElementById("accountList");
list.innerHTML="";

let users=JSON.parse(localStorage.getItem("users")||"{}");

let user=localStorage.getItem("active_user");
let pin=localStorage.getItem("vault_pin");

let vault=users[user].vault[currentApp] || [];

vault.forEach(item=>{

let pass=CryptoJS.AES.decrypt(
item.password,
pin
).toString(CryptoJS.enc.Utf8);

list.innerHTML+=`
<div style="background:#222;padding:10px;margin-top:10px;border-radius:10px">
📧 ${item.email}<br>
🔑 ${pass}
</div>
`;

});

}

/* Modal Controls */

function closeModal(){
document.getElementById("modal").style.display="none";
}

function logout(){
localStorage.removeItem("active_user");
location.reload();
}

/* Auto Login */

if(localStorage.getItem("active_user")){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
}

</script>

</body>
</html>
