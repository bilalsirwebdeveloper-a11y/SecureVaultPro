<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Vault Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
background:#0f0f0f;
font-family:Poppins;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
margin:0;
}
.card{
background:#1a1a1a;
padding:30px;
border-radius:15px;
box-shadow:0 0 25px #00f2ff;
width:350px;
text-align:center;
}
input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
}
button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
background:#00f2ff;
color:black;
font-weight:bold;
cursor:pointer;
}
.hidden{display:none;}
.vault-item{
background:#222;
padding:10px;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="card" id="loginBox">
<h2>🔐 Secure Vault Pro</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Login</button>
<p id="msg"></p>
</div>

<div class="card hidden" id="vaultBox">
<h2>My Vault</h2>
<input type="text" id="appName" placeholder="App Name">
<input type="text" id="username" placeholder="Username">
<input type="password" id="vaultPassword" placeholder="Password">
<button id="saveBtn">Save Entry</button>
<button id="logoutBtn">Logout</button>
<div id="vaultList"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ✅ YOUR FIREBASE CONFIG ADDED */
const firebaseConfig = {
  apiKey: "AIzaSyAQUz9exfnKmUkTm_VbHFeLdKOw60jvFkA",
  authDomain: "vaultpro-8bd4d.firebaseapp.com",
  projectId: "vaultpro-8bd4d",
  storageBucket: "vaultpro-8bd4d.firebasestorage.app",
  messagingSenderId: "563028714315",
  appId: "1:563028714315:web:247516d537f0ae86c7bece",
  measurementId: "G-BELKSE3M90"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginBox = document.getElementById("loginBox");
const vaultBox = document.getElementById("vaultBox");
const msg = document.getElementById("msg");

onAuthStateChanged(auth, (user) => {
if(user){
loginBox.classList.add("hidden");
vaultBox.classList.remove("hidden");
loadVault(user.uid);
}else{
loginBox.classList.remove("hidden");
vaultBox.classList.add("hidden");
}
});

signupBtn.onclick = async ()=>{
try{
await createUserWithEmailAndPassword(auth,email.value,password.value);
msg.innerText="Account Created ✅";
}catch(e){ msg.innerText=e.message; }
}

loginBtn.onclick = async ()=>{
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
}catch(e){ msg.innerText=e.message; }
}

logoutBtn.onclick = ()=> signOut(auth);

saveBtn.onclick = async ()=>{
const user = auth.currentUser;
if(!user) return;

await addDoc(collection(db,"vault"),{
uid:user.uid,
appName:appName.value,
username:username.value,
password:vaultPassword.value,
created:Date.now()
});

alert("Saved 🔐");
loadVault(user.uid);
}

async function loadVault(uid){
vaultList.innerHTML="";
const q = query(collection(db,"vault"), where("uid","==",uid));
const snapshot = await getDocs(q);
snapshot.forEach(doc=>{
let data=doc.data();
vaultList.innerHTML += `
<div class="vault-item">
<strong>${data.appName}</strong><br>
${data.username}
</div>
`;
});
}

</script>

</body>
</html>
