<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Vault Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
body{
background:#0f0f0f;
font-family:Poppins;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
margin:0;
}
.card{
background:#1a1a1a;
padding:30px;
border-radius:15px;
box-shadow:0 0 25px #00f2ff;
width:350px;
text-align:center;
}
input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
}
button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
background:#00f2ff;
color:black;
font-weight:bold;
cursor:pointer;
}
.hidden{display:none;}
.vault-item{
background:#222;
padding:10px;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="card" id="loginBox">
<h2>🔐 Secure Vault Pro</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div class="card hidden" id="vaultBox">
<h2>My Secure Vault</h2>
<input type="text" id="appName" placeholder="App Name">
<input type="text" id="username" placeholder="Username / Email">
<input type="password" id="vaultPassword" placeholder="Password">
<input type="password" id="masterPin" placeholder="Master PIN">
<button onclick="addEntry()">Add Entry</button>
<button onclick="logout()">Logout</button>

<div id="vaultList"></div>
</div>

<script>
/* 🔥 PASTE YOUR FIREBASE CONFIG BELOW */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("vaultBox").classList.remove("hidden");
loadVault();
}else{
document.getElementById("loginBox").classList.remove("hidden");
document.getElementById("vaultBox").classList.add("hidden");
}
});

function signup(){
auth.createUserWithEmailAndPassword(
email.value,
password.value
).then(()=>alert("Account Created"))
.catch(err=>alert(err.message));
}

function login(){
auth.signInWithEmailAndPassword(
email.value,
password.value
).catch(err=>alert(err.message));
}

function logout(){
auth.signOut();
}

function addEntry(){
const encrypted = CryptoJS.AES.encrypt(
vaultPassword.value,
masterPin.value
).toString();

db.collection("vault").add({
uid: auth.currentUser.uid,
appName: appName.value,
username: username.value,
password: encrypted,
created: Date.now()
});

alert("Saved Securely 🔐");
loadVault();
}

function loadVault(){
vaultList.innerHTML="";
db.collection("vault")
.where("uid","==",auth.currentUser.uid)
.get()
.then(snapshot=>{
snapshot.forEach(doc=>{
let data=doc.data();
vaultList.innerHTML += `
<div class="vault-item">
<strong>${data.appName}</strong><br>
${data.username}
</div>
`;
});
});
}
</script>

</body>
</html>
